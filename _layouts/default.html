<!DOCTYPE html>
<html lang="{{ site.lang | default: "en-US" }}">
  <head>
    <meta charset='utf-8'>
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="{{ '/assets/css/style.css?v=' | append: site.github.build_revision | relative_url }}">
    <link rel="stylesheet" href="{{ '/assets/css/pmgg.css?v=' | append: site.github.build_revision | relative_url }}">

{% seo %}
  </head>

  <body>
    <div class="site-backdrop" aria-hidden="true"></div>

    <header class="site-header">
      <div class="container">
        <div class="header-inner">
          <a id="a-title" class="brand-link" href="{{ '/' | relative_url }}">
            <h1>PMGG's Blog</h1>
          </a>
          <nav class="top-nav" aria-label="主要导航">
            <a href="{{ '/' | relative_url }}#ai-notes">AI札记</a>
            <a href="{{ '/' | relative_url }}#knowledge-map">知识地图</a>
            <a href="{{ '/welcome-page.html' | relative_url }}">关于</a>
          </nav>
        </div>
        <h2>Build, test, think, and learn with AI.</h2>
      </div>
    </header>

    <main class="container site-main">
      <section id="main_content">
        {{ content }}
      </section>
    </main>

    {% if site.google_analytics %}
      <script>
        (function(i,s,o,g,r,a,m){i['GoogleAnalyticsObject']=r;i[r]=i[r]||function(){
        (i[r].q=i[r].q||[]).push(arguments)},i[r].l=1*new Date();a=s.createElement(o),
        m=s.getElementsByTagName(o)[0];a.async=1;a.src=g;m.parentNode.insertBefore(a,m)
        })(window,document,'script','//www.google-analytics.com/analytics.js','ga');
        ga('create', '{{ site.google_analytics }}', 'auto');
        ga('send', 'pageview');
      </script>
    {% endif %}
  </body>
</html>
